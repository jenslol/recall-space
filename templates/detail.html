<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory — Recall Space</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ─── TOP NAV ─────────────────────────────────────────────────────────── -->
  <nav class="app-nav">
    <div class="app-nav-inner">
      <a href="/" class="nav-wordmark">RECALL <span>/ space</span></a>

      <div class="nav-links">
        <a href="/?view=timeline" class="nav-link">TIMELINE</a>
        <a href="/?view=search" class="nav-link">SEARCH</a>
        <a href="/?view=collections" class="nav-link">COLLECTIONS</a>
      </div>

      <div class="nav-right">
        <div class="brain-status" id="brain-status-nav">
          <span class="brain-dot" id="brain-dot-nav"></span>
          <span id="brain-label-nav">BRAIN</span>
        </div>
        <button class="nav-btn" id="theme-btn" onclick="toggleTheme()">○</button>
      </div>
    </div>
  </nav>

  <!-- ─── CONTENT ──────────────────────────────────────────────────────────── -->
  <div class="detail-wrap" id="detail-wrap">

    <!-- Loading skeleton -->
    <div id="detail-loading">
      <div class="detail-back" style="pointer-events:none;opacity:0.4;">← BACK</div>
      <div class="detail-header">
        <div class="detail-meta">
          <div class="skeleton" style="width:60px;height:18px;"></div>
          <div class="skeleton" style="width:120px;height:10px;"></div>
        </div>
        <div class="skeleton" style="width:80%;height:28px;margin-bottom:10px;"></div>
        <div class="skeleton" style="width:100%;height:12px;margin-bottom:6px;"></div>
        <div class="skeleton" style="width:70%;height:12px;"></div>
      </div>
      <div class="detail-body">
        <div class="skeleton" style="width:100%;height:12px;margin-bottom:8px;"></div>
        <div class="skeleton" style="width:95%;height:12px;margin-bottom:8px;"></div>
        <div class="skeleton" style="width:85%;height:12px;margin-bottom:8px;"></div>
        <div class="skeleton" style="width:60%;height:12px;"></div>
      </div>
    </div>

    <!-- Actual content (hidden until loaded) -->
    <div id="detail-content" class="hidden">

      <a class="detail-back" href="/" id="back-link">BACK</a>

      <div class="detail-header">
        <div class="detail-meta" id="detail-meta"></div>
        <h1 class="detail-title" id="detail-title"></h1>
        <p class="detail-summary" id="detail-summary"></p>
      </div>

      <!-- Processing notice -->
      <div id="processing-notice" class="processing-note hidden" style="margin-top:20px;">
        <span class="dot"></span>
        <span id="processing-text">Processing…</span>
      </div>

      <!-- Main body -->
      <div class="detail-body" id="detail-body"></div>

      <!-- Tags -->
      <div class="detail-tags" id="detail-tags"></div>

      <!-- Collection assignment -->
      <div class="collection-selector" id="collection-selector">
        <div class="section-head" style="padding:0 0 0;">
          <span class="section-head-label">COLLECTIONS</span>
          <span class="section-head-line"></span>
        </div>
        <div class="collection-chips" id="collection-chips"></div>
      </div>

      <!-- Prev / next nav -->
      <div class="detail-nav" id="detail-nav"></div>

    </div><!-- /detail-content -->

    <!-- Error state -->
    <div id="detail-error" class="hidden" style="padding:48px 0;text-align:center;">
      <div style="font-family:var(--mono);font-size:11px;letter-spacing:0.2em;color:var(--text-3);margin-bottom:12px;">NOT FOUND</div>
      <div style="font-size:13px;color:var(--text-3);margin-bottom:20px;">This memory doesn't exist or was deleted.</div>
      <a href="/" style="font-family:var(--mono);font-size:10px;letter-spacing:0.14em;color:var(--accent);">← BACK TO TIMELINE</a>
    </div>

  </div><!-- /detail-wrap -->


  <!-- ─── BOTTOM NAV (mobile) ──────────────────────────────────────────────── -->
  <nav class="bottom-nav">
    <a href="/" class="bottom-nav-item">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      TIMELINE
    </a>
    <a href="/?capture=1" class="bottom-nav-item bottom-nav-capture">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      CAPTURE
    </a>
    <a href="/?view=search" class="bottom-nav-item">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      SEARCH
    </a>
    <a href="/?view=collections" class="bottom-nav-item">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      LISTS
    </a>
  </nav>


  <!-- ─── TOAST ────────────────────────────────────────────────────────────── -->
  <div id="toast-container"></div>


  <!-- ─── SCRIPTS ─────────────────────────────────────────────────────────── -->
  <script>

  /* ─── THEME ─────────────────────────────────────────────────────────────── */

  function toggleTheme() {
    const html = document.documentElement;
    const btn = document.getElementById('theme-btn');
    if (html.dataset.theme === 'dark') {
      html.dataset.theme = 'light';
      btn.textContent = '●';
      localStorage.setItem('theme', 'light');
    } else {
      html.dataset.theme = 'dark';
      btn.textContent = '○';
      localStorage.setItem('theme', 'dark');
    }
  }

  (function initTheme() {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = saved || (prefersDark ? 'dark' : 'light');
    document.documentElement.dataset.theme = theme;
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = theme === 'dark' ? '○' : '●';
  })();


  /* ─── CONFIG ─────────────────────────────────────────────────────────────── */

  const API_BASE = '';
  function getApiKey() { return localStorage.getItem('recall_api_key') || ''; }
  function apiHeaders() { return { 'Content-Type': 'application/json', 'X-API-Key': getApiKey() }; }


  /* ─── TOAST ─────────────────────────────────────────────────────────────── */

  function showToast(msg, type = 'default', duration = 3000) {
    const container = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = 'toast' + (type === 'accent' ? ' toast-accent' : type === 'error' ? ' toast-err' : '');
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => {
      el.style.opacity = '0'; el.style.transition = 'opacity 0.3s';
      setTimeout(() => el.remove(), 300);
    }, duration);
  }


  /* ─── BRAIN STATUS ───────────────────────────────────────────────────────── */

  async function checkBrainStatus() {
    try {
      const r = await fetch(API_BASE + '/api/brain/status', { headers: { 'X-API-Key': getApiKey() } });
      if (!r.ok) throw new Error();
      const d = await r.json();
      const online = d.online || d.status === 'online';
      const busy = d.busy;
      const cls = busy ? 'busy' : online ? 'online' : '';
      const label = busy ? 'PROCESSING' : online ? 'ONLINE' : 'OFFLINE';
      const dot = document.getElementById('brain-dot-nav');
      const lbl = document.getElementById('brain-label-nav');
      if (dot) dot.className = 'brain-dot ' + cls;
      if (lbl) lbl.textContent = label;
    } catch {}
  }


  /* ─── HELPERS ────────────────────────────────────────────────────────────── */

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function formatDateFull(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', {
      weekday:'long', day:'numeric', month:'long', year:'numeric'
    }) + ' · ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  }


  /* ─── MEMORY ID ──────────────────────────────────────────────────────────── */

  function getMemoryId() {
    // Expects URL like /memory/123
    const parts = window.location.pathname.split('/');
    return parts[parts.length - 1] || parts[parts.length - 2];
  }


  /* ─── LOAD MEMORY ────────────────────────────────────────────────────────── */

  async function loadMemory() {
    const id = getMemoryId();
    if (!id) { showError(); return; }

    try {
      const r = await fetch(API_BASE + `/api/memories/${id}`, {
        headers: { 'X-API-Key': getApiKey() }
      });
      if (r.status === 404) { showError(); return; }
      if (!r.ok) throw new Error();
      const mem = await r.json();

      document.title = (mem.title || 'Memory') + ' — Recall Space';
      renderMemory(mem);
      document.getElementById('detail-loading').style.display = 'none';
      document.getElementById('detail-content').classList.remove('hidden');

      // Load adjacent memories for nav
      loadAdjacentMemories(id);

      // Load collections for chip selector
      loadCollectionChips(id, mem.collection_ids || []);

      // If still processing, poll for updates
      if (mem.status === 'processing' || mem.status === 'pending') {
        setTimeout(() => pollProcessing(id), 5000);
      }

    } catch {
      showError();
    }
  }

  function showError() {
    document.getElementById('detail-loading').style.display = 'none';
    document.getElementById('detail-error').classList.remove('hidden');
  }

  function renderMemory(mem) {
    // Meta row
    const typeCls = mem.memory_type === 'voice' ? 'detail-type-voice' : '';
    const type = (mem.memory_type || 'text').toUpperCase();
    document.getElementById('detail-meta').innerHTML = `
      <span class="detail-type-badge ${typeCls}">${type}</span>
      <span class="detail-timestamp">${formatDateFull(mem.created_at)}</span>
      ${mem.source_url ? `<a href="${escapeHtml(mem.source_url)}" target="_blank" rel="noopener"
        style="font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:0.08em;"
        onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1">
        ↗ SOURCE</a>` : ''}
    `;

    // Title
    document.getElementById('detail-title').textContent = mem.title || 'Untitled';

    // Summary
    const summaryEl = document.getElementById('detail-summary');
    if (mem.summary) {
      summaryEl.textContent = mem.summary;
      summaryEl.style.display = '';
    } else {
      summaryEl.style.display = 'none';
    }

    // Processing notice
    const noticeEl = document.getElementById('processing-notice');
    if (mem.status === 'processing') {
      noticeEl.classList.remove('hidden');
      document.getElementById('processing-text').textContent = 'AI processing in progress — check back shortly.';
    } else if (mem.status === 'pending') {
      noticeEl.classList.remove('hidden');
      document.getElementById('processing-text').textContent = 'Queued for processing — brain may be offline.';
    } else {
      noticeEl.classList.add('hidden');
    }

    // Body content
    const body = document.getElementById('detail-body');
    body.innerHTML = '';

    // Voice: audio player + transcript
    if (mem.memory_type === 'voice') {
      if (mem.audio_path || mem.file_path) {
        const audioBlock = document.createElement('div');
        audioBlock.className = 'audio-player-block';
        audioBlock.innerHTML = `
          <audio controls src="/uploads/${escapeHtml(mem.audio_path || mem.file_path)}" preload="metadata"></audio>
        `;
        body.appendChild(audioBlock);
      }
      if (mem.transcript) {
        const block = document.createElement('div');
        block.className = 'transcript-block';
        block.innerHTML = `
          <div class="transcript-label">TRANSCRIPT</div>
          <div class="transcript-text">${escapeHtml(mem.transcript)}</div>
        `;
        body.appendChild(block);
      }
    }

    // Image
    if (mem.memory_type === 'image' || (mem.file_path && /\.(jpg|jpeg|png|gif|webp)$/i.test(mem.file_path || ''))) {
      const img = document.createElement('img');
      img.className = 'memory-image';
      img.src = `/uploads/${mem.file_path}`;
      img.alt = mem.title || '';
      body.appendChild(img);
    }

    // Full text content / OCR
    const textContent = mem.content || mem.ocr_text || mem.extracted_text;
    if (textContent && mem.memory_type !== 'voice') {
      const block = document.createElement('div');
      block.className = 'content-block';
      block.textContent = textContent;
      body.appendChild(block);
    }

    // Tags
    const tagsEl = document.getElementById('detail-tags');
    tagsEl.innerHTML = '';
    const tags = mem.tags || [];
    if (tags.length) {
      tags.forEach(t => {
        const chip = document.createElement('a');
        chip.className = 'detail-tag';
        chip.textContent = t;
        chip.href = `/?view=search&q=${encodeURIComponent(t)}`;
        tagsEl.appendChild(chip);
      });
    }
  }

  async function pollProcessing(id) {
    try {
      const r = await fetch(API_BASE + `/api/memories/${id}`, { headers: { 'X-API-Key': getApiKey() } });
      if (!r.ok) return;
      const mem = await r.json();
      if (mem.status === 'done' || mem.status === 'complete') {
        renderMemory(mem);
        showToast('Processing complete.', 'accent');
      } else {
        setTimeout(() => pollProcessing(id), 8000);
      }
    } catch {}
  }

  async function loadAdjacentMemories(id) {
    try {
      const r = await fetch(API_BASE + `/api/memories/${id}/adjacent`, {
        headers: { 'X-API-Key': getApiKey() }
      });
      if (!r.ok) return;
      const { prev, next } = await r.json();

      const navEl = document.getElementById('detail-nav');
      navEl.innerHTML = '';

      if (prev) {
        const el = document.createElement('a');
        el.className = 'detail-nav-item';
        el.href = `/memory/${prev.id}`;
        el.innerHTML = `
          <span class="detail-nav-label">← PREVIOUS</span>
          <span class="detail-nav-title">${escapeHtml(prev.title || 'Untitled')}</span>
        `;
        navEl.appendChild(el);
      }
      if (next) {
        const el = document.createElement('a');
        el.className = 'detail-nav-item';
        el.href = `/memory/${next.id}`;
        el.style.textAlign = 'right';
        el.innerHTML = `
          <span class="detail-nav-label">NEXT →</span>
          <span class="detail-nav-title">${escapeHtml(next.title || 'Untitled')}</span>
        `;
        navEl.appendChild(el);
      }
    } catch {}
  }

  async function loadCollectionChips(memId, assignedIds) {
    try {
      const r = await fetch(API_BASE + '/api/collections', { headers: { 'X-API-Key': getApiKey() } });
      if (!r.ok) return;
      const data = await r.json();
      const collections = Array.isArray(data) ? data : (data.collections || []);

      const chips = document.getElementById('collection-chips');
      chips.innerHTML = '';

      collections.forEach(col => {
        const chip = document.createElement('button');
        chip.className = 'collection-chip' + (assignedIds.includes(col.id) ? ' active' : '');
        chip.textContent = col.name;
        chip.dataset.colId = col.id;
        chip.addEventListener('click', () => toggleCollection(memId, col.id, chip));
        chips.appendChild(chip);
      });

      if (!collections.length) {
        document.getElementById('collection-selector').style.display = 'none';
      }
    } catch {
      document.getElementById('collection-selector').style.display = 'none';
    }
  }

  async function toggleCollection(memId, colId, chip) {
    const isActive = chip.classList.contains('active');
    const method = isActive ? 'DELETE' : 'POST';
    try {
      const r = await fetch(API_BASE + `/api/collections/${colId}/memories/${memId}`, {
        method,
        headers: { 'X-API-Key': getApiKey() }
      });
      if (!r.ok) throw new Error();
      chip.classList.toggle('active', !isActive);
    } catch {
      showToast('Could not update collection.', 'error');
    }
  }


  /* ─── INIT ───────────────────────────────────────────────────────────────── */

  checkBrainStatus();
  loadMemory();

  </script>
</body>
</html>
